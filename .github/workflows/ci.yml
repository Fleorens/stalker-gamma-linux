name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint + type + test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PyGObject-stubs (extra `dev`) déclare une dépendance dure sur PyGObject
      # lui-même (pas de roue manylinux, voir pyproject.toml) : sans ces
      # en-têtes système, `pip install .[dev]` échoue à la compilation.
      - name: Install GTK4/libadwaita build headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libgirepository-2.0-dev gir1.2-gtk-4.0 gir1.2-adw-1 pkg-config

      - name: Install project (dev extra)
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy src

      - name: pytest
        run: pytest -q

  build:
    name: build package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14
